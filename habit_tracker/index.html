<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <div>
                <h1>Habits</h1>
                <p>Track your daily progress and build streaks.</p>
            </div>

            <div class="controls">
                <button id="prev-week" class="btn-icon">◀</button>
                <div id="week-display" class="week-label">Oct 16 - Oct 22</div>
                <button id="next-week" class="btn-icon">▶</button>
                <button id="btn-today" class="btn-text">Today</button>
            </div>
        </header>

        <main class="card">
            <div id="empty-state" class="empty-state hidden">
                <h2>No habits yet</h2>
                <p>Add a daily habit below to begin tracking your progress.</p>
            </div>

            <div id="table-container" class="table-responsive">
                <table id="habit-table">
                    <thead>
                        <tr id="table-header">
                            <!-- Generated by JavaScript -->
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Generated by JavaScript -->
                    </tbody>
                </table>
            </div>

            <form id="add-habit-form" class="add-form">
                <input type="text" id="habit-input" placeholder="e.g. Read 30 mins, Workout..." required>
                <button type="submit" class="btn-primary">+ Add</button>
            </form>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
